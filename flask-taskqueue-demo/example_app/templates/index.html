<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generic Task Tracker Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 2em; background-color: #f8f9fa; color: #343a40; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #0056b3; }
        #controls { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input[type="text"] { width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; margin-bottom: 1rem; }
        button { background-color: #007bff; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #0056b3; }
        #results div { margin-top: 1em; line-height: 1.6; }
        span { font-weight: bold; font-family: monospace; background: #e9ecef; padding: 3px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Generic Task Tracker</h1>
        <div id="controls">
            <label for="task-name-input">Enter a task name to process:</label>
            <input type="text" id="task-name-input" value="Process Monthly Sales Report" />
            <button onclick="runTask()">Run Task</button>
        </div>
        <div id="results">
            <div>Job ID: <span id="job-id">---</span></div>
            <div>Status: <span id="status">---</span></div>
            <div>Result: <span id="result">---</span></div>
        </div>
    </div>

    <script>
        function clearResults() {
            document.getElementById('job-id').textContent = '---';
            document.getElementById('status').textContent = 'Submitting...';
            document.getElementById('result').textContent = '---';
        }
    
        async function runTask() {
            clearResults();
            const taskName = document.getElementById('task-name-input').value;
            const response = await fetch('/run-task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task_name: taskName }),
            });
            const data = await response.json();
            document.getElementById('job-id').textContent = data.job_id;
            pollStatus(data.job_id);
        }
        

        async function pollStatus(jobId) {
            const statusElement = document.getElementById('status');
            const resultElement = document.getElementById('result');
            statusElement.textContent = 'pending...';

            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/task_status/${jobId}`);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    statusElement.textContent = data.status;

                    if (data.status === 'finished') {
                        resultElement.textContent = data.result;
                        clearInterval(interval);
                    } else if (data.status === 'failed') {
                        resultElement.textContent = `Error: ${data.result}`;
                        clearInterval(interval);
                    }
                } catch (error) {
                    resultElement.textContent = `Failed to fetch status: ${error}`;
                    clearInterval(interval);
                }
            }, 2000);
        }
        
    </script>
</body>
</html>
